<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Type Defender</title>

  <!-- Pretendard Variable (UI) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />

  <!-- Google Fonts: Black Han Sans (타이틀) · Gaegu (칠판 손글씨) · JetBrains Mono (숫자) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gaegu:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" />

  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/effects.js"></script>
  <script src="js/wordData.js"></script>
  <script src="js/ui.js"></script> 
  <script src="js/achievements.js"></script> 
  <script src="js/input.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</head>
<body>
  <div class="start">
    </div>

  <div class="play">
    <div class="hud">
        <div id="score" class="score-display">SCORE: 0</div>
        <div class="hp-container">
            <span class="hp-label">HP</span>
            <div class="hp-track">
                <div id="hp-fill" class="hp-fill ok" style="width: 100%;"></div>
            </div>
            <span id="hp-text" class="hp-percent">100%</span>
        </div>
    </div>

    <div class="notebook-input">
      <div class="typing-area">
        <span class="pencil-icon">✏️</span>
        <input type="text" id="hidden-input" autofocus 
               style="position: absolute; opacity: 0; pointer-events: none;" 
               autocomplete="off">
        <div id="word-display" class="word-display"></div>
      </div>
      <div class="meta-info">
        <span id="lang">JavaScript</span>
        <span id="level">LV.1</span>
        <span id="missed">MISSED: 0</span>
      </div>
    </div>
  </div>

  <div class="game-over">
    </div>
  <div id="toast-container"></div>
    </section>
  </main>

  <script src="./js/config.js"></script>
  <script src="./js/themes.js"></script>
  <script src="./js/effects.js"></script>
</body>
</html>
