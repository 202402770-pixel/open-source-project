<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Type Defender</title>

  <!-- Pretendard Variable (UI) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />

  <!-- Google Fonts: Black Han Sans (타이틀) · Gaegu (칠판 손글씨) · JetBrains Mono (숫자) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gaegu:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" />

  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="start"></div>

  <div class="play">
    <div class="hud">
      <div id="score" class="score-display">SCORE: 0</div>
      <div class="hp-container">
        <span class="hp-label">HP</span>
        <div class="hp-track">
          <div id="hp-fill" class="hp-fill ok" style="width: 100%;"></div>
        </div>
        <span id="hp-text" class="hp-percent">100%</span>
      </div>
    </div>

    <div class="notebook-input">
      <div class="typing-area">
        <span class="pencil-icon">✏️</span>
        <input type="text" id="hidden-input" autofocus
               style="position: absolute; opacity: 0; pointer-events: none;"
               autocomplete="off">
        <div id="word-display" class="word-display"></div>
      </div>
      <div class="meta-info">
        <span id="lang">JavaScript</span>
        <span id="level">LV.1</span>
        <span id="missed">MISSED: 0</span>
      </div>
    </div>
  </div>

  <div class="game-over">
    <div class="scorecard-wrapper">
      <div class="scorecard">
        <h1 class="scorecard-title">성적표</h1>
        
        <div id="result-stamp" class="stamp show">
          <span id="result-grade">F</span>
        </div>
        
        <div id="result-new-record" class="new-record" style="display: none;">★ NEW RECORD! ★</div>
        
        <div class="stats-container">
          <div class="stat-row">
            <span class="stat-label">점수</span>
            <span id="result-score" class="stat-value">0</span> </div>
          <div class="stat-row">
            <span class="stat-label">최대콤보</span>
            <span id="result-combo" class="stat-value">x0</span> </div>
          <div class="stat-row">
            <span class="stat-label">도달 레벨</span>
            <span id="result-level" class="stat-value">LV.1</span> </div>
          
          <hr class="stat-divider">
          
          <div class="stat-row">
            <span class="stat-label">평균 WPM</span>
            <span id="result-wpm" class="stat-value">0</span> </div>
          <div class="stat-row">
            <span class="stat-label">정확도</span>
            <span id="result-accuracy" class="stat-value">0%</span> </div>
          <div class="stat-row">
            <span class="stat-label">단어수</span>
            <span id="result-words" class="stat-value">0</span> </div>
        </div>
        
        <div class="action-buttons">
          <button id="restart-btn" class="btn btn-primary">다시 수강</button>
          <button class="btn btn-secondary" onclick="UI.toggleRankingModal(true)">순위표</button>
          <button class="btn btn-secondary" onclick="alert('준비중입니다.')">도전과제</button>
          <button class="btn btn-text" onclick="alert('준비중입니다.')">공유</button>
        </div>
      </div>
    </div>
    </div>
    </div>
  <div id="toast-container"></div>
  <div id="ranking-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="ranking-modal-content">
      <h2 class="ranking-title">순위표</h2>
      <div class="ranking-tabs">
        <button class="tab-btn active" data-type="all">전체</button>
        <button class="tab-btn" data-type="week">이번주</button>
        <button class="tab-btn" data-type="today">오늘</button>
      </div>
      <div class="ranking-list" id="ranking-container">
        </div>
      <button id="close-ranking-btn" class="ranking-close-btn">CLOSE</button>
    </div>
  </div>

  <!-- Scripts (의존성 순서대로 — CONFIG 먼저, main.js 마지막) -->
  <script src="./js/config.js"></script>
  <script src="./js/themes.js"></script>
  <script src="./js/effects.js"></script>
  <script src="./js/wordData.js"></script>
  <script src="./js/achievements.js"></script>
  <script src="./js/grade.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/input.js"></script>
  <script src="./js/game.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
